<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prévisualisation PDF</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0b1830;
      --line: rgba(120, 160, 255, 0.18);
      --text: #e8f0ff;
      --muted: #9eb4d9;
      --accent: #5fa8ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .viewer-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(95,168,255,0.05), transparent 180px),
        var(--bg);
    }

    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(6, 16, 31, 0.92);
      backdrop-filter: blur(8px);
    }

    .viewer-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn {
      border: 1px solid rgba(95,168,255,0.45);
      background: linear-gradient(180deg, rgba(95,168,255,0.14), rgba(95,168,255,0.08));
      color: var(--text);
      border-radius: 12px;
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      background: linear-gradient(180deg, rgba(95,168,255,0.22), rgba(95,168,255,0.12));
    }

    .viewer-body {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #06101f;
    }

    #pdfFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #0a0f1a;
    }

    .state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .state.error {
      color: #ffb4b4;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="viewer-shell">
    <div class="viewer-header">
      <div class="viewer-title" id="title">Prévisualisation PDF</div>
      <div class="viewer-actions">
        <a id="openBtn" class="btn" href="#" target="_blank" rel="noopener noreferrer">Ouvrir</a>
        <button class="btn" type="button" onclick="window.close()">Fermer</button>
      </div>
    </div>

    <div class="viewer-body">
      <div id="state" class="state">Chargement du PDF…</div>
      <iframe id="pdfFrame" title="Prévisualisation PDF"></iframe>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const analysisId = params.get("analysis_id");
    const sha256 = params.get("sha256");
    const filename = params.get("filename") || "document.pdf";

    const titleEl = document.getElementById("title");
    const stateEl = document.getElementById("state");
    const frameEl = document.getElementById("pdfFrame");
    const openBtn = document.getElementById("openBtn");

    titleEl.textContent = `Prévisualisation — ${filename}`;

    if (!analysisId || !sha256) {
      stateEl.classList.add("error");
      stateEl.innerHTML = `
        Paramètres manquants pour afficher le PDF.
        <div class="hint">analysis_id et sha256 sont requis.</div>
      `;
    } else {
      const pdfUrl = `/api/analyses/${encodeURIComponent(analysisId)}/attachments/${encodeURIComponent(sha256)}/pdf`;
      openBtn.href = pdfUrl;

      frameEl.onload = () => {
        stateEl.style.display = "none";
        frameEl.style.display = "block";
      };

      frameEl.onerror = () => {
        stateEl.classList.add("error");
        stateEl.innerHTML = `
          Impossible de charger le PDF.
          <div class="hint">Vérifie que la route PDF répond bien et que la pièce jointe existe encore.</div>
        `;
      };

      frameEl.src = pdfUrl;
    }
  </script>
</body>
</html>
